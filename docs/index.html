<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Luiz Nishimori | Deputado Federal</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #000000;
      padding-top: 90px;
      overflow-x: hidden;
    }

    body.menu-open {
      overflow: hidden;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 90px;
      background: rgba(231, 240, 248, 0.95);
      border: 1px solid #004b9b;
      z-index: 999;
    }

    .header-container {
      width: 100%;
      max-width: 1080px;
      height: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
    }

    .logo img {
      width: 145px;
      height: auto;
      display: block;
    }

    .desktop-menu {
      display: flex;
      align-items: center;
      gap: 42px;
    }

    .desktop-menu a {
      position: relative;
      font-size: 18px;
      font-weight: 400;
      color: #000000;
      line-height: 1;
      padding-bottom: 8px;
      transition: color 0.25s ease, transform 0.25s ease;
    }

    .desktop-menu a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 0;
      height: 2px;
      background: #004b9b;
      border-radius: 999px;
      transition: width 0.25s ease;
    }

    .desktop-menu a:hover {
      color: #004b9b;
      transform: translateY(-2px);
    }

    .desktop-menu a:hover::after {
      width: 100%;
    }

    .menu-mobile {
      display: none;
      width: 34px;
      height: 28px;
      border: none;
      background: transparent;
      cursor: pointer;
      position: relative;
      z-index: 1001;
    }

    .menu-mobile span {
      display: block;
      width: 34px;
      height: 4px;
      background: #004b9b;
      border-radius: 6px;
      margin-bottom: 6px;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .menu-mobile span:last-child {
      margin-bottom: 0;
    }

    .menu-mobile.active span:nth-child(1) {
      transform: translateY(10px) rotate(45deg);
    }

    .menu-mobile.active span:nth-child(2) {
      opacity: 0;
    }

    .menu-mobile.active span:nth-child(3) {
      transform: translateY(-10px) rotate(-45deg);
    }

    .mobile-menu-panel {
      display: none;
    }

    .hero {
      width: 100%;
      min-height: calc(100vh - 90px);
      background-image:
        linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.98) 0%,
          rgba(255, 255, 255, 0.95) 23%,
          rgba(255, 255, 255, 0.45) 43%,
          rgba(255, 255, 255, 0.02) 62%
        ),
        url("assets/img/hero-desktop.webp");
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center top;
      border-bottom-right-radius: 34px;
      position: relative;
      display: flex;
      align-items: center;
    }

    .hero-content {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding-left: 88px;
      padding-top: 10px;
      position: relative;
      z-index: 2;
    }

    .hero-text {
      width: 465px;
    }

    .hero h1 {
      font-size: 58px;
      line-height: 0.82;
      font-weight: 900;
      letter-spacing: -3px;
      color: #004b9b;
      margin-bottom: 20px;
    }

    .hero h1 span {
      color: #10a13b;
    }

    .hero p {
      font-size: 24px;
      line-height: 0.92;
      font-weight: 400;
      color: #000000;
      max-width: 450px;
      margin-bottom: 38px;
    }

    .hero-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 465px;
    }

    .btn {
      width: 100%;
      height: 93px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 29px;
      font-weight: 800;
      line-height: 1;
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(0, 75, 155, 0.18);
    }

    .btn-primary {
      background: #10a13b;
      color: #ffffff;
      border: 1px solid #10a13b;
    }

    .btn-primary:hover {
      background: #0c8d33;
    }

    .btn-secondary {
      background: #ffffff;
      color: #004b9b;
      border: 1.5px solid #004b9b;
    }

    .btn-secondary:hover {
      background: #004b9b;
      color: #ffffff;
    }

    .mobile-hero-image {
      display: none;
    }

    @media (max-width: 1023px) {
      body {
        padding-top: 76px;
      }

      .site-header {
        height: 76px;
        background: rgba(231, 240, 248, 0.98);
      }

      .header-container {
        padding: 0 26px;
      }

      .logo img {
        width: 150px;
      }

      .desktop-menu {
        display: none;
      }

      .menu-mobile {
        display: block;
      }

      .mobile-menu-panel {
        position: fixed;
        top: 76px;
        left: 0;
        width: 100%;
        background: rgba(231, 240, 248, 0.98);
        border-bottom: 1px solid #004b9b;
        padding: 26px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        opacity: 0;
        visibility: hidden;
        transform: translateY(-16px);
        pointer-events: none;
        transition: opacity 0.25s ease, visibility 0.25s ease, transform 0.25s ease;
        z-index: 998;
      }

      .mobile-menu-panel.active {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
        pointer-events: auto;
      }

      .mobile-menu-panel a {
        width: 100%;
        padding: 16px 18px;
        border-radius: 16px;
        background: #ffffff;
        border: 1px solid rgba(0, 75, 155, 0.18);
        color: #004b9b;
        font-size: 18px;
        font-weight: 700;
        box-shadow: 0 8px 18px rgba(0, 75, 155, 0.08);
      }

      .mobile-menu-panel a:active {
        transform: scale(0.98);
      }

      .hero {
        min-height: auto;
        display: block;
        background: #ffffff;
        border-bottom-right-radius: 0;
      }

      .mobile-hero-image {
        display: block;
        width: 100%;
        height: 445px;
        background-image:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0) 55%,
            rgba(255, 255, 255, 1) 100%
          ),
          url("assets/img/hero-mobile.webp");
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center top;
      }

      .hero-content {
        padding: 0 26px 42px;
        margin-top: -12px;
      }

      .hero-text {
        width: 100%;
        text-align: center;
      }

      .hero h1 {
        font-size: 40px;
        line-height: 0.82;
        letter-spacing: -2px;
        margin-bottom: 16px;
      }

      .hero p {
        font-size: 14px;
        line-height: 0.9;
        max-width: 270px;
        margin: 0 auto 22px;
      }

      .hero-buttons {
        width: 100%;
        gap: 8px;
      }

      .btn {
        height: 68px;
        font-size: 26px;
      }
    }

    @media (min-width: 1024px) and (max-width: 1180px) {
      .hero-content {
        padding-left: 55px;
      }

      .hero-text,
      .hero-buttons {
        width: 430px;
      }

      .hero h1 {
        font-size: 52px;
      }

      .hero p {
        font-size: 22px;
      }

      .btn {
        height: 84px;
        font-size: 26px;
      }
    }
  </style>
</head>

<body>

  <header class="site-header">
    <div class="header-container">

      <a href="#inicio" class="logo" aria-label="Luiz Nishimori">
        <img src="assets/img/logo-nishimori.webp" alt="Luiz Nishimori Deputado Federal" />
      </a>

      <nav class="desktop-menu" aria-label="Menu principal">
        <a href="#atuacao">Atuação</a>
        <a href="#emendas">Emendas</a>
        <a href="#propostas">Propostas</a>
        <a href="#entregas">Entregas por município</a>
        <a href="#noticias">Notícias</a>
      </nav>

      <button class="menu-mobile" type="button" aria-label="Abrir menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>

    </div>

    <nav class="mobile-menu-panel" aria-label="Menu mobile">
      <a href="#atuacao">Atuação</a>
      <a href="#emendas">Emendas</a>
      <a href="#propostas">Propostas</a>
      <a href="#entregas">Entregas por município</a>
      <a href="#noticias">Notícias</a>
    </nav>
  </header>

  <main id="inicio">

    <section class="hero">

      <div class="mobile-hero-image"></div>

      <div class="hero-content">
        <div class="hero-text">

          <h1>
            Uma trajetória<br>
            de <span>resultado</span> pelo<br>
            Paraná.
          </h1>

          <p>
            Deputado presente, municipalista e comprometido com o desenvolvimento do Paraná.
          </p>

          <div class="hero-buttons">
            <a href="#atuacao" class="btn btn-primary">
              Conheça a atuação
            </a>

            <a href="#gabinete" class="btn btn-secondary">
              Fale com o gabinete
            </a>
          </div>

        </div>
      </div>

    </section>

  </main>

  <script>
    const menuButton = document.querySelector(".menu-mobile");
    const mobileMenu = document.querySelector(".mobile-menu-panel");
    const body = document.body;
    const mobileLinks = document.querySelectorAll(".mobile-menu-panel a");

    menuButton.addEventListener("click", function () {
      const isOpen = mobileMenu.classList.toggle("active");

      menuButton.classList.toggle("active", isOpen);
      body.classList.toggle("menu-open", isOpen);
      menuButton.setAttribute("aria-expanded", isOpen ? "true" : "false");
      menuButton.setAttribute("aria-label", isOpen ? "Fechar menu" : "Abrir menu");
    });

    mobileLinks.forEach(function (link) {
      link.addEventListener("click", function () {
        mobileMenu.classList.remove("active");
        menuButton.classList.remove("active");
        body.classList.remove("menu-open");
        menuButton.setAttribute("aria-expanded", "false");
        menuButton.setAttribute("aria-label", "Abrir menu");
      });
    });
  </script>

</body>
</html>
