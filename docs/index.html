<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Luiz Nishimori | Deputado Federal</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #000000;
      padding-top: 90px;
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 90px;
      background: rgba(231, 240, 248, 0.95);
      border: 1px solid #004b9b;
      z-index: 999;
    }

    .header-container {
      width: 100%;
      max-width: 1080px;
      height: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
    }

    .logo img {
      width: 145px;
      height: auto;
      display: block;
    }

    .desktop-menu {
      display: flex;
      align-items: center;
      gap: 42px;
    }

    .desktop-menu a {
      font-size: 18px;
      font-weight: 400;
      color: #000000;
      line-height: 1;
      transition: 0.2s ease;
    }

    .desktop-menu a.active {
      font-weight: 700;
      color: #004b9b;
      border-bottom: 2px solid #004b9b;
      padding-bottom: 8px;
    }

    .menu-mobile {
      display: none;
      width: 30px;
      height: 24px;
      border: none;
      background: transparent;
      cursor: pointer;
    }

    .menu-mobile span {
      display: block;
      width: 30px;
      height: 4px;
      background: #004b9b;
      border-radius: 6px;
      margin-bottom: 5px;
    }

    .hero {
      width: 100%;
      min-height: calc(100vh - 90px);
      background-image:
        linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.98) 0%,
          rgba(255, 255, 255, 0.95) 23%,
          rgba(255, 255, 255, 0.45) 43%,
          rgba(255, 255, 255, 0.02) 62%
        ),
        url("assets/img/hero-desktop.webp");
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center top;
      border-bottom-right-radius: 34px;
      position: relative;
      display: flex;
      align-items: center;
    }

    .hero-content {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding-left: 88px;
      padding-top: 10px;
      position: relative;
      z-index: 2;
    }

    .hero-text {
      width: 465px;
    }

    .hero h1 {
      font-size: 58px;
      line-height: 0.82;
      font-weight: 900;
      letter-spacing: -3px;
      color: #004b9b;
      margin-bottom: 20px;
    }

    .hero h1 span {
      color: #10a13b;
    }

    .hero p {
      font-size: 24px;
      line-height: 0.92;
      font-weight: 400;
      color: #000000;
      max-width: 450px;
      margin-bottom: 38px;
    }

    .hero-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 465px;
    }

    .btn {
      width: 100%;
      height: 93px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 29px;
      font-weight: 800;
      line-height: 1;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: #10a13b;
      color: #ffffff;
      border: 1px solid #10a13b;
    }

    .btn-secondary {
      background: #ffffff;
      color: #004b9b;
      border: 1.5px solid #004b9b;
    }

    .mobile-hero-image {
      display: none;
    }

    @media (max-width: 1023px) {
      body {
        padding-top: 76px;
      }

      .site-header {
        height: 76px;
        background: rgba(231, 240, 248, 0.95);
      }

      .header-container {
        padding: 0 26px;
      }

      .logo img {
        width: 150px;
      }

      .desktop-menu {
        display: none;
      }

      .menu-mobile {
        display: block;
      }

      .hero {
        min-height: auto;
        display: block;
        background: #ffffff;
        border-bottom-right-radius: 0;
      }

      .mobile-hero-image {
        display: block;
        width: 100%;
        height: 445px;
        background-image:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0) 55%,
            rgba(255, 255, 255, 1) 100%
          ),
          url("assets/img/hero-mobile.webp");
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center top;
      }

      .hero-content {
        padding: 0 26px 42px;
        margin-top: -12px;
      }

      .hero-text {
        width: 100%;
        text-align: center;
      }

      .hero h1 {
        font-size: 40px;
        line-height: 0.82;
        letter-spacing: -2px;
        margin-bottom: 16px;
      }

      .hero p {
        font-size: 14px;
        line-height: 0.9;
        max-width: 270px;
        margin: 0 auto 22px;
      }

      .hero-buttons {
        width: 100%;
        gap: 8px;
      }

      .btn {
        height: 68px;
        font-size: 26px;
      }
    }

    @media (min-width: 1024px) and (max-width: 1180px) {
      .hero-content {
        padding-left: 55px;
      }

      .hero-text,
      .hero-buttons {
        width: 430px;
      }

      .hero h1 {
        font-size: 52px;
      }

      .hero p {
        font-size: 22px;
      }

      .btn {
        height: 84px;
        font-size: 26px;
      }
    }
  </style>
</head>

<body>

  <header class="site-header">
    <div class="header-container">

      <a href="#inicio" class="logo" aria-label="Luiz Nishimori">
        <img src="assets/img/logo-nishimori.webp" alt="Luiz Nishimori Deputado Federal" />
      </a>

      <nav class="desktop-menu" aria-label="Menu principal">
        <a href="#atuacao" class="active">Atuação</a>
        <a href="#emendas">Emendas</a>
        <a href="#propostas">Propostas</a>
        <a href="#entregas">Entregas por município</a>
        <a href="#noticias">Notícias</a>
      </nav>

      <button class="menu-mobile" type="button" aria-label="Abrir menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

    </div>
  </header>

  <main id="inicio">

    <section class="hero">

      <div class="mobile-hero-image"></div>

      <div class="hero-content">
        <div class="hero-text">

          <h1>
            Uma trajetória<br>
            de <span>resultado</span> pelo<br>
            Paraná.
          </h1>

          <p>
            Deputado presente, municipalista e comprometido com o desenvolvimento do Paraná.
          </p>

          <div class="hero-buttons">
            <a href="#atuacao" class="btn btn-primary">
              Conheça a atuação
            </a>

            <a href="#gabinete" class="btn btn-secondary">
              Fale com o gabinete
            </a>
          </div>

        </div>
      </div>

    </section>

  </main>

</body>
</html>
